server:
  port: 9002
  tomcat:
    threads:
      max: ${DISPATCHER_TOMCAT_THREADS_MAX:150}
      min-spare: ${DISPATCHER_TOMCAT_THREADS_MIN_SPARE:10}
    max-connections: ${DISPATCHER_TOMCAT_MAX_CONNECTIONS:1000}
    accept-count: ${DISPATCHER_TOMCAT_ACCEPT_COUNT:300}
    connection-timeout: ${DISPATCHER_TOMCAT_CONNECTION_TIMEOUT:10s}

spring:
  profiles:
    include: secret, polling

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          enabled: true
          max-active: ${DISPATCHER_REDIS_POOL_MAX_ACTIVE:96}
          max-idle: ${DISPATCHER_REDIS_POOL_MAX_IDLE:24}
          min-idle: ${DISPATCHER_REDIS_POOL_MIN_IDLE:8}
          max-wait: ${DISPATCHER_REDIS_POOL_MAX_WAIT:200ms}
queue:
  max-active-shoppers: ${QUEUE_MAX_ACTIVE_SHOPPERS:500}
  new-users-per-minute: ${QUEUE_NEW_USERS_PER_MINUTE:3000}
  promotion-batch-size: ${QUEUE_PROMOTION_BATCH_SIZE:50}
  promotion-interval-ms: ${QUEUE_PROMOTION_INTERVAL_MS:1000}
  entry-token-ttl-minutes: ${QUEUE_ENTRY_TOKEN_TTL_MINUTES:10}
  polling-interval-seconds: ${QUEUE_POLLING_INTERVAL_SECONDS:5}
  max-polling-interval-seconds: ${QUEUE_MAX_POLLING_INTERVAL_SECONDS:15}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
