name: aws-ecs-codedeploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'ticketon' }}
  DEPLOY_ENV: ${{ vars.DEPLOY_ENV || 'dev' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run backend CI checks
        run: |
          chmod +x ./gradlew
          ./gradlew architectureRules --no-daemon --console=plain

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deployment names
        id: names
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          name="${PROJECT_NAME}-${DEPLOY_ENV}"
          echo "account_id=$account_id" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_OUTPUT"
          echo "codedeploy_app=${CODEDEPLOY_APPLICATION_NAME:-$name}" >> "$GITHUB_OUTPUT"
          echo "codedeploy_group=${CODEDEPLOY_DEPLOYMENT_GROUP_NAME:-$name}" >> "$GITHUB_OUTPUT"
          echo "codedeploy_bucket=${CODEDEPLOY_S3_BUCKET:-${name}-codedeploy-${account_id}-${AWS_REGION}}" >> "$GITHUB_OUTPUT"
        env:
          CODEDEPLOY_APPLICATION_NAME: ${{ vars.CODEDEPLOY_APPLICATION_NAME }}
          CODEDEPLOY_DEPLOYMENT_GROUP_NAME: ${{ vars.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}
          CODEDEPLOY_S3_BUCKET: ${{ vars.CODEDEPLOY_S3_BUCKET }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build jars
        run: |
          chmod +x ./gradlew
          ./gradlew :platform:eureka:build :platform:gateway:build :app:build :auth:build :broker:build :dispatcher:build -x test --no-daemon

      - name: Build and push runtime images
        shell: bash
        run: |
          set -euo pipefail

          build_push() {
            local service="$1"
            local dockerfile="$2"
            local context="$3"
            local repo="${{ steps.names.outputs.ecr_registry }}/${PROJECT_NAME}-${DEPLOY_ENV}/${service}"
            docker build -f "$dockerfile" -t "$repo:${GITHUB_SHA}" -t "$repo:latest" "$context"
            docker push "$repo:${GITHUB_SHA}"
            docker push "$repo:latest"
          }

          build_push eureka platform/eureka/Dockerfile.runtime platform/eureka
          build_push gateway platform/gateway/Dockerfile.runtime platform/gateway
          build_push app app/Dockerfile.runtime app
          build_push auth auth/Dockerfile.runtime auth
          build_push broker broker/Dockerfile.runtime broker
          build_push dispatcher dispatcher/Dockerfile.runtime dispatcher

      - name: Create CodeDeploy bundle
        shell: bash
        run: |
          set -euo pipefail
          chmod +x codedeploy/scripts/*.sh
          rm -rf codedeploy-bundle
          mkdir -p codedeploy-bundle/codedeploy/scripts
          cp codedeploy/appspec.yml codedeploy-bundle/appspec.yml
          cp codedeploy/scripts/*.sh codedeploy-bundle/codedeploy/scripts/
          (cd codedeploy-bundle && zip -r ../codedeploy-bundle.zip .)

      - name: Upload CodeDeploy bundle
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          key="codedeploy/${GITHUB_SHA}.zip"
          aws s3 cp codedeploy-bundle.zip "s3://${{ steps.names.outputs.codedeploy_bucket }}/${key}"
          echo "key=$key" >> "$GITHUB_OUTPUT"

      - name: Ensure ECS service exists
        shell: bash
        run: |
          set -euo pipefail
          status="$(aws ecs describe-services \
            --cluster "${{ steps.names.outputs.codedeploy_app }}" \
            --services "${{ steps.names.outputs.codedeploy_group }}" \
            --query 'services[0].status' \
            --output text 2>/dev/null || true)"

          if [[ "$status" == "ACTIVE" ]]; then
            aws ecs update-service \
              --cluster "${{ steps.names.outputs.codedeploy_app }}" \
              --service "${{ steps.names.outputs.codedeploy_group }}" \
              --desired-count 1 >/dev/null
            exit 0
          fi

          aws ecs create-service \
            --cluster "${{ steps.names.outputs.codedeploy_app }}" \
            --service-name "${{ steps.names.outputs.codedeploy_group }}" \
            --task-definition "${{ steps.names.outputs.codedeploy_group }}" \
            --desired-count 1 \
            --capacity-provider-strategy capacityProvider=${{ steps.names.outputs.codedeploy_group }}-ec2,weight=1 \
            --deployment-configuration minimumHealthyPercent=0,maximumPercent=100 >/dev/null

      - name: Register task definition with gateway CORS
        id: task_def
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.names.outputs.ecr_registry }}
          ALLOWED_ORIGINS: ${{ vars.GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS }}
        run: |
          set -euo pipefail
          cluster="${{ steps.names.outputs.codedeploy_app }}"
          service="${{ steps.names.outputs.codedeploy_group }}"
          current_task_def="$(aws ecs describe-services \
            --cluster "$cluster" \
            --services "$service" \
            --query 'services[0].taskDefinition' \
            --output text)"
          if [[ -z "$current_task_def" || "$current_task_def" == "None" ]]; then
            current_task_def="$service"
          fi

          aws ecs describe-task-definition \
            --task-definition "$current_task_def" \
            --query taskDefinition > task-definition.json

          python3 - "$ECR_REGISTRY" "$PROJECT_NAME" "$DEPLOY_ENV" "$GITHUB_SHA" "$ALLOWED_ORIGINS" <<'PY'
          import json
          import sys

          registry, project, deploy_env, sha, origins = sys.argv[1:6]
          services = {"eureka", "gateway", "app", "auth", "broker", "dispatcher"}
          with open("task-definition.json", encoding="utf-8") as fh:
              task = json.load(fh)

          keep = {
              "family", "taskRoleArn", "executionRoleArn", "networkMode",
              "containerDefinitions", "volumes", "placementConstraints",
              "requiresCompatibilities", "cpu", "memory", "pidMode", "ipcMode",
              "proxyConfiguration", "inferenceAccelerators", "ephemeralStorage",
              "runtimePlatform",
          }
          task = {key: value for key, value in task.items() if key in keep}
          task["networkMode"] = "bridge"
          task["requiresCompatibilities"] = ["EC2"]
          java_tool_options = {
              "eureka": "-Xms32m -Xmx64m",
              "gateway": "-Xms48m -Xmx128m",
              "app": "-Xms64m -Xmx160m",
              "auth": "-Xms48m -Xmx128m",
              "broker": "-Xms32m -Xmx96m",
              "dispatcher": "-Xms32m -Xmx96m",
          }
          memory_reservations = {
              "redis": 16,
              "rabbitmq": 96,
              "eureka": 48,
              "app": 96,
              "auth": 64,
              "broker": 48,
              "dispatcher": 48,
              "gateway": 64,
          }
          gateway_environment = {
              "EUREKA_CLIENT_SERVICEURL_DEFAULTZONE": "http://eureka:8761/eureka/",
              "EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE": "http://eureka:8761/eureka/",
              "EUREKA_CLIENT_HOST_NAME": "gateway",
              "EUREKA_HOST_NAME": "gateway",
              "EUREKA_INSTANCE_HOSTNAME": "gateway",
              "GATEWAY_SERVER_NETTY_MAX_CONNECTIONS": "256",
              "GATEWAY_REACTOR_NETTY_POOL_MAX_CONNECTIONS": "128",
              "GATEWAY_HTTPCLIENT_POOL_MAX_CONNECTIONS": "128",
              "GATEWAY_REDIS_POOL_MAX_ACTIVE": "16",
              "GATEWAY_REDIS_POOL_MAX_IDLE": "4",
              "GATEWAY_REDIS_POOL_MIN_IDLE": "1",
              "GATEWAY_HTTPCLIENT_POOL_ACQUIRE_TIMEOUT_MILLIS": "2000",
              "GATEWAY_HTTPCLIENT_POOL_ACQUIRE_TIMEOUT": "2s",
          }
          demo_seed_environment = {
              "TICKETON_DEMO_DATA_ENABLED": "true",
              "TICKETON_DEMO_DATA_USER_EMAIL": "testuser@ticketon.local",
              "TICKETON_DEMO_DATA_USER_PASSWORD": "Ticketon123!",
          }
          app_internal_environment = {
              "SERVICES_EVENT_BASE_URL": "http://localhost:9000",
              "SERVICES_SEAT_BASE_URL": "http://localhost:9000",
          }

          def set_environment(container, values):
              env = {item["name"]: item["value"] for item in container.get("environment", [])}
              env.update(values)
              container["environment"] = [{"name": key, "value": value} for key, value in env.items()]

          for container in task["containerDefinitions"]:
              name = container["name"]
              if name in services:
                  container["image"] = f"{registry}/{project}-{deploy_env}/{name}:{sha}"
              if name in memory_reservations:
                  container["memoryReservation"] = memory_reservations[name]
              if name in java_tool_options:
                  set_environment(container, {"JAVA_TOOL_OPTIONS": java_tool_options[name]})
              if name in {"app", "auth"}:
                  set_environment(container, demo_seed_environment)
              if name == "app":
                  set_environment(container, app_internal_environment)
              if name == "rabbitmq":
                  container.pop("healthCheck", None)
              for dependency in container.get("dependsOn", []):
                  if dependency.get("containerName") == "rabbitmq" and dependency.get("condition") == "HEALTHY":
                      dependency["condition"] = "START"
              if name == "gateway":
                  set_environment(container, gateway_environment)
                  container["portMappings"] = [{"containerPort": 8080, "hostPort": 8080, "protocol": "tcp"}]
                  env = [item for item in container.get("environment", []) if item.get("name") != "GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS"]
                  if origins:
                      env.append({"name": "GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS", "value": origins})
                  container["environment"] = env

          with open("task-definition.next.json", "w", encoding="utf-8") as fh:
              json.dump(task, fh)
          PY

          task_def_arn="$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.next.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          echo "arn=$task_def_arn" >> "$GITHUB_OUTPUT"

          aws ecs update-service \
            --cluster "$cluster" \
            --service "$service" \
            --task-definition "$task_def_arn" \
            --desired-count 1 >/dev/null

          echo "Updated ECS service with task definition: $task_def_arn"

      - name: Wait backend ECS deployment
        shell: bash
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "${{ steps.names.outputs.codedeploy_app }}" \
            --services "${{ steps.names.outputs.codedeploy_group }}"
          echo "Backend ECS service is stable."

      - name: Resolve backend gateway URL
        id: gateway_url
        shell: bash
        env:
          BACKEND_EC2_HOST: ${{ vars.BACKEND_EC2_HOST }}
          BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
        run: |
          set -euo pipefail

          to_gateway_url() {
            local host="$1"
            if [[ "$host" =~ ^https?:// ]]; then
              echo "${host%/}"
            elif [[ "$host" == *:* ]]; then
              echo "http://${host%/}"
            else
              echo "http://${host%/}:8080"
            fi
          }

          is_reachable_gateway() {
            local url="${1%/}"
            local code
            code="$(curl -k -sS -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 12 "$url" || true)"
            [[ "$code" != "000" ]]
          }

          resolve_host_by_name() {
            local name_filter="$1"
            local host
            host="$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=${name_filter}" "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].PublicDnsName | [0]' \
              --output text)"
            if [[ -z "$host" || "$host" == "None" ]]; then
              host="$(aws ec2 describe-instances \
                --filters "Name=tag:Name,Values=${name_filter}" "Name=instance-state-name,Values=running" \
                --query 'Reservations[].Instances[].PublicIpAddress | [0]' \
                --output text)"
            fi
            if [[ -n "$host" && "$host" != "None" ]]; then
              echo "$host"
            fi
          }

          candidate_urls=()
          if [[ -n "${BACKEND_EC2_HOST:-}" ]]; then
            candidate_urls+=("$(to_gateway_url "$BACKEND_EC2_HOST")")
          fi
          if [[ -n "${BACKEND_PUBLIC_URL:-}" ]]; then
            candidate_urls+=("$(to_gateway_url "$BACKEND_PUBLIC_URL")")
          fi

          public_host=""
          for name_filter in \
            "${{ steps.names.outputs.codedeploy_group }}-ecs" \
            "${PROJECT_NAME}-${DEPLOY_ENV}-ecs" \
            "*${PROJECT_NAME}*ecs*" \
            "*${PROJECT_NAME}*${DEPLOY_ENV}*"; do
            public_host="$(resolve_host_by_name "$name_filter")"
            if [[ -n "$public_host" ]]; then
              echo "Resolved backend EC2 host using tag Name=${name_filter}"
              candidate_urls+=("$(to_gateway_url "$public_host")")
              break
            fi
          done

          if [[ -z "$public_host" || "$public_host" == "None" ]]; then
            aws ec2 describe-instances \
              --filters "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].{id:InstanceId,name:Tags[?Key==`Name`]|[0].Value,dns:PublicDnsName,ip:PublicIpAddress}' \
              --output json > running-instances.json
            public_host="$(python3 - "$PROJECT_NAME" "$DEPLOY_ENV" running-instances.json <<'PY'
          import json
          import sys

          project, deploy_env, instances_path = sys.argv[1:4]
          with open(instances_path, encoding="utf-8") as fh:
              instances = json.load(fh)

          def public_host(instance):
              return instance.get("dns") or instance.get("ip") or ""

          public_instances = [item for item in instances if public_host(item)]
          candidates = [
              item for item in public_instances
              if project in (item.get("name") or "") and deploy_env in (item.get("name") or "")
          ]
          if not candidates:
              candidates = [
                  item for item in public_instances
                  if project in (item.get("name") or "") and "ecs" in (item.get("name") or "").lower()
              ]
          if not candidates and len(public_instances) == 1:
              candidates = public_instances
          if candidates:
              print(public_host(candidates[0]))
          PY
            )"
            if [[ -n "$public_host" && "$public_host" != "None" ]]; then
              candidate_urls+=("$(to_gateway_url "$public_host")")
            fi
          fi

          gateway_url=""
          for _ in {1..60}; do
            for candidate in "${candidate_urls[@]}"; do
              candidate="${candidate%/}"
              if [[ -z "$candidate" ]]; then
                continue
              fi
              if is_reachable_gateway "$candidate"; then
                gateway_url="$candidate"
                break 2
              fi
              echo "Backend candidate not reachable yet: $candidate"
            done
            sleep 10
          done

          if [[ -z "$gateway_url" ]]; then
            echo "Backend public URL not reachable within 10 minutes."
            exit 1
          fi

          echo "url=$gateway_url" >> "$GITHUB_OUTPUT"
          echo "Resolved backend gateway URL: $gateway_url"
