<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Ticketon Admin Users</title>
	<style>
		body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #17202a; background: #f5f7fa; }
		header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 24px; background: #fff; border-bottom: 1px solid #d8dee8; }
		h1 { margin: 0; font-size: 20px; }
		main { padding: 24px; display: grid; gap: 20px; }
		.notice { color: #126c43; }
		.error { color: #a12622; }
		form.inline { display: inline; }
		.create { display: grid; grid-template-columns: minmax(180px, 1fr) minmax(160px, 240px) 160px auto; gap: 10px; align-items: end; }
		label { display: grid; gap: 6px; font-size: 13px; font-weight: 600; }
		input, select { min-height: 38px; border: 1px solid #b9c2cf; border-radius: 6px; padding: 7px 10px; font-size: 14px; }
		button { min-height: 36px; border: 1px solid #98a6b8; border-radius: 6px; background: #fff; color: #17202a; font-weight: 600; cursor: pointer; }
		button.primary { border-color: #1769aa; background: #1769aa; color: #fff; }
		table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d8dee8; }
		th, td { padding: 10px 12px; border-bottom: 1px solid #e6ebf2; text-align: left; font-size: 14px; vertical-align: middle; }
		th { background: #edf2f7; font-size: 12px; text-transform: uppercase; letter-spacing: 0; }
		.actions { display: flex; flex-wrap: wrap; gap: 6px; }
		@media (max-width: 820px) {
			.create { grid-template-columns: 1fr; }
			table, thead, tbody, th, td, tr { display: block; }
			thead { display: none; }
			tr { border-bottom: 1px solid #d8dee8; }
			td { border: 0; }
		}
	</style>
</head>
<body>
<header>
	<h1>User Management</h1>
	<form th:action="@{/admin/logout}" method="post">
		<span th:text="${adminEmail}"></span>
		<button type="submit">Logout</button>
	</form>
</header>
<main>
	<p class="notice" th:if="${message}" th:text="${message}"></p>
	<p class="error" th:if="${error}" th:text="${error}"></p>

	<form class="create" th:action="@{/admin/users}" th:object="${createUserForm}" method="post">
		<label>
			Email
			<input th:field="*{email}" type="email" required>
		</label>
		<label>
			Password
			<input th:field="*{password}" type="password" required>
		</label>
		<label>
			Role
			<select th:field="*{role}">
				<option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
			</select>
		</label>
		<button class="primary" type="submit">Create</button>
	</form>

	<table>
		<thead>
		<tr>
			<th>Email</th>
			<th>Role</th>
			<th>Status</th>
			<th>Lock</th>
			<th>Actions</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="user : ${users}">
			<td th:text="${user.maskedEmail()}"></td>
			<td th:text="${user.role()}"></td>
			<td th:text="${user.status()}"></td>
			<td th:text="${user.locked()} ? |LOCKED (${user.loginAttemptCount()})| : '-'"></td>
			<td class="actions">
				<form class="inline" th:action="@{|/admin/users/${user.securityUserId()}/promote-manager|}" method="post">
					<button type="submit">Promote</button>
				</form>
				<form class="inline" th:action="@{|/admin/users/${user.securityUserId()}/suspend|}" method="post">
					<button type="submit">Suspend</button>
				</form>
				<form class="inline" th:action="@{|/admin/users/${user.securityUserId()}/unsuspend|}" method="post">
					<button type="submit">Unsuspend</button>
				</form>
				<form class="inline" th:action="@{|/admin/users/${user.securityUserId()}/delete|}" method="post">
					<button type="submit">Delete</button>
				</form>
			</td>
		</tr>
		</tbody>
	</table>
</main>
</body>
</html>
