<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Ticketon Admin Login</title>
	<style>
		body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #17202a; background: #f5f7fa; }
		main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
		form { width: min(100%, 360px); background: #fff; border: 1px solid #d8dee8; border-radius: 8px; padding: 24px; box-shadow: 0 10px 24px rgba(30, 41, 59, .08); }
		h1 { margin: 0 0 20px; font-size: 22px; line-height: 1.2; }
		label { display: grid; gap: 6px; margin-top: 14px; font-size: 13px; font-weight: 600; }
		input { box-sizing: border-box; width: 100%; min-height: 40px; border: 1px solid #b9c2cf; border-radius: 6px; padding: 8px 10px; font-size: 15px; }
		button { width: 100%; min-height: 42px; margin-top: 20px; border: 0; border-radius: 6px; background: #1769aa; color: #fff; font-weight: 700; cursor: pointer; }
		.error { margin: 0 0 12px; color: #a12622; font-size: 14px; }
		.field-error { color: #a12622; font-size: 12px; }
	</style>
</head>
<body>
<main>
	<form th:action="@{/admin/login}" th:object="${loginForm}" method="post">
		<h1>Ticketon Admin</h1>
		<p class="error" th:if="${error}" th:text="${error}"></p>
		<label>
			Email
			<input th:field="*{email}" type="email" autocomplete="username" required>
			<span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
		</label>
		<label>
			Password
			<input th:field="*{password}" type="password" autocomplete="current-password" required>
			<span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
		</label>
		<button type="submit">Login</button>
	</form>
</main>
</body>
</html>
